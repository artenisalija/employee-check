name: Build release installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build Windows setup files
        shell: powershell
        run: .\scripts\build.ps1 -Installer
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: dist/installers/*.exe

  macos:
    name: macOS DMGs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build macOS DMGs
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmgs
          path: dist/*.dmg

  linux:
    name: Linux DEBs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux build tools
        run: sudo apt-get update && sudo apt-get install -y python3-tk dpkg-dev
      - name: Build Linux packages
        run: bash scripts/build_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-debs
          path: dist/*.deb

  github-release:
    name: Publish GitHub release
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*

